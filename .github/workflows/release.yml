name: Release Tau Prime

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Test, package, and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install development environment
        # The in-tree backend intentionally builds sdists only and does not
        # implement PEP 660 editable installs, so do not install the project.
        run: uv sync --python 3.13 --dev --no-install-project

      - name: Check tag against package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          version="$(.venv/bin/python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject version v${version}" >&2
            exit 1
          fi

      - name: Run tests and build source distribution
        run: make PYTHON=.venv/bin/python UVX=uvx package

      - name: Prepare release assets
        shell: bash
        run: |
          version="$(.venv/bin/python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="v${version}"
          fi
          source="dist/tau_prime-${version}.tar.gz"
          cp "${source}" "dist/tau-prime.tar.gz"
          cp "${source}" "dist/tau-prime-${tag}.tar.gz"
          (cd dist && sha256sum tau-prime.tar.gz "tau-prime-${tag}.tar.gz" > SHA256SUMS)
          tar -tzf dist/tau-prime.tar.gz >/dev/null
          echo "RELEASE_TAG=${tag}" >> "${GITHUB_ENV}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${RELEASE_TAG}" \
            dist/tau-prime.tar.gz \
            "dist/tau-prime-${RELEASE_TAG}.tar.gz" \
            dist/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --title "Tau Prime ${RELEASE_TAG}"
